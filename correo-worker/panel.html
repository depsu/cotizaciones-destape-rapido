<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bandeja · Agente de Cotizaciones</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cotizaciones" />
<meta name="theme-color" content="#0F6E6E" />
<style>
  :root{
    --brand:#0F6E6E; --brand-soft:#EAF4F2; --accent:#E0A82E;
    --dark:#1E2A2A; --gray:#5F6B6B; --line:#e3e8e8; --bg:#f5f7f7;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--dark)}
  header{background:var(--brand);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;
         position:sticky;top:0;z-index:10}
  header h1{font-size:17px;margin:0;font-weight:600;flex:1}
  header button{background:rgba(255,255,255,.15);color:#fff;border:0;border-radius:8px;padding:7px 12px;
                font-size:13px;cursor:pointer}
  header button:hover{background:rgba(255,255,255,.28)}
  .wrap{max-width:880px;margin:0 auto;padding:14px}

  #login{max-width:360px;margin:14vh auto;background:#fff;border:1px solid var(--line);border-radius:14px;
         padding:26px;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.06)}
  #login h2{margin:0 0 4px;color:var(--brand)}
  #login p{color:var(--gray);font-size:13px;margin:0 0 18px}
  #login input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px}
  #login button{margin-top:12px;width:100%;background:var(--brand);color:#fff;border:0;border-radius:9px;
                padding:11px;font-size:15px;font-weight:600;cursor:pointer}
  .err{color:#b5462e;font-size:13px;margin-top:10px;min-height:16px}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;
        cursor:pointer;transition:.12s;position:relative}
  .card:hover{border-color:var(--brand);box-shadow:0 3px 12px rgba(15,110,110,.08)}
  .card-noleido{border-left:3px solid var(--brand)}
  .row1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .de{font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dark)}
  .de.bold,.asunto.bold{font-weight:700}
  .fecha{font-size:12px;color:var(--gray);white-space:nowrap}
  .asunto{font-size:14px;color:var(--dark);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .snippet{font-size:12.5px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:10.5px;background:var(--brand-soft);color:var(--brand);padding:2px 7px;border-radius:20px;font-weight:600}
  .est{font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:700}
  .est-ajuste{background:#fde0e0;color:#b5462e}
  .qa{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .qa-b{background:#f2f5f5;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;
        cursor:pointer;color:var(--dark)}
  .qa-b:hover{background:#e7edec}
  .cargar-mas{display:block;width:100%;margin:6px 0 20px;background:#fff;border:1px solid var(--line);
              border-radius:10px;padding:12px;font-size:13.5px;color:var(--brand);font-weight:600;cursor:pointer}
  .cargar-mas:hover{background:var(--brand-soft)}

  .tabs{display:flex;gap:8px;overflow-x:auto;max-width:820px;margin:0 auto;padding:12px 16px 0;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;font-size:13.5px;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--gray);
       border-radius:999px;padding:7px 15px;cursor:pointer;white-space:nowrap}
  .tab.activo{background:var(--brand);border-color:var(--brand);color:#fff}
  .tab-cnt{display:inline-block;min-width:18px;height:18px;line-height:18px;padding:0 5px;margin-left:4px;
           background:#e5484d;color:#fff;border-radius:999px;font-size:11px;text-align:center;vertical-align:1px}
  .tab-cnt.gris{background:#9aa5a5}
  .vacio{text-align:center;color:var(--gray);padding:50px 0;font-size:14px}

  .blq{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .blq .v{font-weight:600;font-size:14px}
  .blq .m{font-size:12.5px;color:var(--gray);margin-top:3px}
  .blq .f{font-size:11.5px;color:var(--gray);margin-top:3px}
  .blq button{margin-top:8px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 11px;
              font-size:12.5px;cursor:pointer;color:var(--brand)}

  #overlay{position:fixed;inset:0;background:rgba(20,30,30,.45);display:none;align-items:flex-start;
           justify-content:center;padding:20px;z-index:20;overflow:auto}
  #modal{background:#fff;border-radius:14px;max-width:760px;width:100%;margin:24px auto;overflow:hidden}
  .mhead{background:var(--brand);color:#fff;padding:16px 18px}
  .mhead .masunto{font-size:16px;font-weight:600;margin-bottom:6px}
  .mhead .meta{font-size:12.5px;opacity:.92;line-height:1.5}
  .mbody{padding:16px 18px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;
         max-height:44vh;overflow:auto;border-bottom:1px solid var(--line)}
  .mbody iframe{width:100%;border:0;min-height:240px}
  .mclose{position:sticky;top:0;float:right;background:rgba(255,255,255,.2);border:0;color:#fff;
          width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1}
  .burbuja{max-width:82%;padding:9px 12px;border-radius:12px;margin:8px 0;white-space:pre-wrap;
           font-size:13.5px;line-height:1.5;word-break:break-word}
  .b-cli{background:#fff;border:1px solid var(--line);margin-right:auto;border-top-left-radius:3px}
  .b-nos{background:var(--brand-soft);margin-left:auto;border-top-right-radius:3px}
  .b-meta{font-size:11px;color:var(--gray);margin-bottom:4px;font-weight:600}
  .b-adj{font-size:12px;color:var(--brand);margin-top:6px}
  .resp{padding:16px 18px;background:#fafcfc}
  .resp h3{margin:0 0 8px;font-size:13px;color:var(--brand);text-transform:uppercase;letter-spacing:.04em}
  .resp textarea{width:100%;min-height:160px;border:1px solid var(--line);border-radius:9px;padding:11px;
                 font-size:14px;font-family:inherit;line-height:1.6;resize:vertical}
  .acciones{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .btn{border:0;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-claude{background:#5b3fbf;color:#fff}
  .btn-guardar{background:#eef2f2;color:var(--dark)}
  .btn-enviar{background:var(--brand);color:#fff}
  .btn-spam{background:#fff;border:1px solid var(--line);color:#b5462e}
  .btn[disabled]{opacity:.55;cursor:default}
  .estado-msg{font-size:12.5px;color:var(--gray);margin-top:8px;min-height:16px}
  .enviada{background:#d6f0e2;border:1px solid #aedcc4;border-radius:9px;padding:12px;white-space:pre-wrap;
           font-size:13.5px;line-height:1.6}
  .ajuste-box textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:9px;padding:10px;
           font-size:13.5px;font-family:inherit;margin-bottom:8px}
  .ajuste-cola{background:#fff6ed;border:1px solid #f1d3b5;border-radius:9px;padding:11px;font-size:13px;line-height:1.55}
  .ajuste-tit{font-size:12px;color:#5b3fbf;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
</style>
</head>
<body>

<div id="login">
  <h2>🔒 Bandeja</h2>
  <p>Agente de Cotizaciones — ingresa la contraseña del panel.</p>
  <input id="pass" type="password" placeholder="Contraseña" autocomplete="current-password" />
  <button onclick="entrar()">Entrar</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>📥 Bandeja de cotizaciones</h1>
    <button onclick="activarNotis()" title="Activar notificaciones">🔔</button>
    <button onclick="cargar(true)">↻</button>
    <button onclick="salir()">Salir</button>
  </header>
  <div class="tabs">
    <button id="tab-recibidos" class="tab activo" onclick="setFiltro('recibidos')">Recibidos</button>
    <button id="tab-enviados" class="tab" onclick="setFiltro('enviados')">Enviados</button>
    <button id="tab-spam" class="tab" onclick="setFiltro('spam')">Spam</button>
    <button id="tab-bloqueados" class="tab" onclick="setFiltro('bloqueados')">Bloqueados</button>
  </div>
  <div class="wrap" id="lista"><div class="vacio">Cargando…</div></div>
</div>

<div id="overlay" onclick="if(event.target.id==='overlay')cerrar()">
  <div id="modal">
    <div class="mhead">
      <button class="mclose" onclick="cerrar()">×</button>
      <div class="masunto" id="mAsunto"></div>
      <div class="meta" id="mMeta"></div>
    </div>
    <div class="mbody" id="mBody"></div>
    <div class="resp" id="mResp"></div>
  </div>
</div>

<script>
const KEY = "panel_pass_agente";
const NOSOTROS = "contacto@destaperapido.cl";
let pass = localStorage.getItem(KEY) || "";
let actual = null;                 // correo abierto
let filtro = "recibidos";
let page = 1, pageSize = 25, hasMore = false, cargando = false;
let items = [], lastTotal = 0;
let bloqueadosItems = [];

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function fmtFecha(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return esc(iso); // recibido_en puede venir del header Date (posible XSS)
  const now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});
  if (d.getFullYear() === now.getFullYear())
    return d.toLocaleDateString("es-CL",{day:"numeric",month:"short"});
  return d.toLocaleDateString("es-CL",{day:"2-digit",month:"2-digit",year:"2-digit"});
}
function fechaFull(iso){ const d=new Date(iso); return isNaN(d)?(iso||""):d.toLocaleString("es-CL"); }

async function api(path, opts){
  const o = opts || {};
  o.headers = Object.assign({ "x-panel-pass": pass }, o.headers || {});
  const r = await fetch(path, o);
  if (r.status === 401) throw new Error("401");
  return r.json();
}

function entrar(){
  pass = document.getElementById("pass").value.trim();
  if(!pass) return;
  localStorage.setItem(KEY, pass);
  iniciar();
}
function salir(){ localStorage.removeItem(KEY); pass=""; location.reload(); }

async function iniciar(){
  try{
    await cargar(true);
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    refrescarContadores();
    asegurarPush();
  }catch(e){
    document.getElementById("login").style.display="block";
    document.getElementById("app").style.display="none";
    document.getElementById("loginErr").textContent = "Contraseña incorrecta.";
    localStorage.removeItem(KEY); pass="";
  }
}

// ---------- Navegación por carpetas ----------
function setFiltro(f){
  filtro = f;
  for(const t of ["recibidos","enviados","spam","bloqueados"]){
    const el=document.getElementById("tab-"+t); if(el) el.classList.toggle("activo", t===f);
  }
  if(f==="bloqueados"){ cargarBloqueados(); return; }
  cargar(true);
}

// ---------- Lista de correos (paginada) ----------
async function cargar(reset){
  if(reset){ page=1; items=[]; }
  const d = await api(`/api/correos?filtro=${filtro}&page=${page}&pageSize=${pageSize}`);
  items = reset ? (d.correos||[]) : items.concat(d.correos||[]);
  hasMore = !!d.hasMore;
  lastTotal = d.total || items.length;
  render();
}
async function cargarMas(){
  if(cargando || !hasMore) return;
  cargando=true; page++;
  try{ await cargar(false); } finally { cargando=false; }
}

function vacioMsg(){
  return filtro==="enviados" ? "Aún no hay correos ni cotizaciones enviadas."
       : filtro==="spam"     ? "No hay spam."
       : "Sin correos por responder. Cuando llegue uno a contacto@destaperapido.cl aparecerá aquí.";
}

function accionesHtml(c){
  if(filtro==="spam"){
    return `<div class="qa">
      <button class="qa-b" onclick="event.stopPropagation();noSpam(${c.id})">↩️ No es spam</button>
      <button class="qa-b" onclick="event.stopPropagation();bloquear(${c.id},'email')">🚫 Bloquear remitente</button>
      <button class="qa-b" onclick="event.stopPropagation();bloquear(${c.id},'dominio')">🌐 Bloquear dominio</button>
    </div>`;
  }
  if(filtro==="enviados") return "";
  return `<div class="qa"><button class="qa-b" onclick="event.stopPropagation();spam(${c.id})">🚫 Marcar spam</button></div>`;
}

function cardHtml(c){
  const noLeido = !c.leido;
  // En Enviados, tanto las cotizaciones proactivas ('enviado') como las respuestas ('respondido')
  // se muestran como salientes: "→ destinatario". El destinatario de una respuesta es el cliente (c.de).
  const quien = c.estado==="enviado" ? "→ "+esc(c.para||"")
              : c.estado==="respondido" ? "→ "+esc(c.de||"")
              : esc(c.de);
  // Los salientes se ordenan/fechan por la fecha de envío (respondido_en), no la de recepción.
  const cuando = (c.estado==="respondido"||c.estado==="enviado") ? (c.respondido_en||c.recibido_en) : c.recibido_en;
  const nHilo = c.hilo_n || 1;
  return `
    <div class="card${noLeido?' card-noleido':''}" onclick="ver(${c.id})">
      <div class="row1">
        <span class="de${noLeido?' bold':''}">${quien}</span>
        ${c.confianza==="baja"?`<span class="est est-ajuste">⚠️ Revisar</span>`:""}
        ${nHilo>1?`<span class="badge">💬 ${nHilo}</span>`:""}
        <span class="fecha" title="${esc(fechaFull(cuando))}">${esc(fmtFecha(cuando))}</span>
      </div>
      <div class="asunto${noLeido?' bold':''}">${esc(c.asunto)}</div>
      <div class="snippet">${esc(c.snippet||"")}</div>
      ${accionesHtml(c)}
    </div>`;
}

function render(){
  const lista = document.getElementById("lista");
  let html = items.length ? items.map(c=>cardHtml(c)).join("") : `<div class="vacio">${vacioMsg()}</div>`;
  if(hasMore){
    html += `<button class="cargar-mas" onclick="cargarMas()">⬇️ Cargar más antiguos (${items.length} de ${lastTotal})</button>`;
  }
  lista.innerHTML = html;
}

// ---------- Contadores / badges ----------
async function refrescarContadores(){
  try{
    const c = await api("/api/contadores");
    const setB = (id, n, gris) => {
      const el=document.getElementById("tab-"+id); if(!el) return;
      const base = id.charAt(0).toUpperCase()+id.slice(1);
      el.innerHTML = base + (n>0 ? ` <span class="tab-cnt${gris?' gris':''}">${n>99?'99+':n}</span>` : "");
    };
    setB("recibidos", c.recibidos_no_leidos||0, false);
    setB("enviados", c.enviados_no_leidos||0, true);
    setB("spam", c.spam||0, true);
    if(navigator.setAppBadge){ try{ (c.pendientes>0)?navigator.setAppBadge(c.pendientes):navigator.clearAppBadge(); }catch(e){} }
  }catch(e){}
}

// ---------- Acciones spam / bloqueo (con aprendizaje) ----------
async function spam(id){
  try{ await api("/api/spam",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id})}); }catch(e){}
  cargar(true); refrescarContadores();
}
async function noSpam(id){
  try{ await api("/api/no-spam",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id})}); }catch(e){}
  cargar(true); refrescarContadores();
}
async function bloquear(id, tipo){
  const c = items.find(x=>x.id===id) || actual;
  if(!c || !c.de){ return; }
  const objetivo = tipo==="dominio" ? (c.de.split("@")[1]||c.de) : c.de;
  const motivo = prompt(`¿Por qué bloquear "${objetivo}" para SIEMPRE?\nLa IA aprende de esto (obligatorio):`);
  if(!motivo || !motivo.trim()) return;
  if(!confirm(`Se ocultarán TODOS los correos de "${objetivo}" y no volverá a llegar. ¿Confirmas?`)) return;
  const body = tipo==="dominio" ? {dominio:c.de.split("@")[1], motivo} : {de:c.de, motivo};
  try{
    const d = await api("/api/bloquear",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});
    if(d.error){ alert("⚠️ "+d.error); return; }
  }catch(e){ alert("Error: "+e.message); return; }
  cerrar(); cargar(true); refrescarContadores();
}

// ---------- Carpeta Bloqueados ----------
async function cargarBloqueados(){
  const lista = document.getElementById("lista");
  try{
    const d = await api("/api/bloqueados");
    bloqueadosItems = d.bloqueados || [];
  }catch(e){ bloqueadosItems=[]; }
  if(!bloqueadosItems.length){ lista.innerHTML = `<div class="vacio">No hay remitentes bloqueados.</div>`; return; }
  lista.innerHTML = bloqueadosItems.map((b,i)=>`
    <div class="blq">
      <div class="v">${b.tipo==="dominio"?"🌐 ":"🚫 "}${esc(b.valor)}</div>
      ${b.motivo?`<div class="m">Motivo: ${esc(b.motivo)}</div>`:""}
      <div class="f">Bloqueado ${esc(fechaFull(b.creado_en))}</div>
      <button onclick="desbloquear(${i})">↩️ Desbloquear</button>
    </div>`).join("");
}
async function desbloquear(idx){
  const b = bloqueadosItems[idx];
  if(!b) return;
  const motivo = prompt(`¿Por qué quitas el bloqueo de "${b.valor}"? (opcional, la IA aprende)`) || "";
  try{
    await api("/api/desbloquear",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({tipo:b.tipo, valor:b.valor, motivo})});
  }catch(e){ alert("Error: "+e.message); return; }
  cargarBloqueados(); refrescarContadores();
}

// ---------- Modal: correo / conversación ----------
async function ver(id){
  const c = await api("/api/correo?id="+id);
  actual = c;
  document.getElementById("mAsunto").textContent = c.asunto || "(sin asunto)";
  let hilo = null;
  if(c.thread_id){
    try{ hilo = await api("/api/hilo?thread_id="+encodeURIComponent(c.thread_id)); }catch(e){}
  }
  const body = document.getElementById("mBody");
  if(hilo && hilo.mensajes && hilo.mensajes.length>1){
    document.getElementById("mMeta").innerHTML = `Conversación · ${hilo.mensajes.length} mensajes`;
    body.innerHTML = conversacionHtml(hilo.mensajes);
    body.scrollTop = body.scrollHeight;
  } else {
    document.getElementById("mMeta").innerHTML =
      `De: <b>${esc(c.de)}</b><br>Para: ${esc(c.para)}<br>${esc(fechaFull(c.recibido_en))}`;
    if (c.cuerpo_texto && c.cuerpo_texto.trim()){ body.textContent = c.cuerpo_texto; }
    else if (c.cuerpo_html){ body.innerHTML='<iframe sandbox></iframe>'; body.querySelector("iframe").srcdoc=c.cuerpo_html; }
    else { body.textContent="(sin contenido)"; }
  }
  renderResp(c);
  document.getElementById("overlay").style.display="flex";
  // Marcado como leído server-side al abrir: reflejarlo en la lista sin recargar.
  const it = items.find(x=>x.id===id); if(it){ it.leido=1; render(); }
  refrescarContadores();
}

function conversacionHtml(msgs){
  const arr = [];
  for(const m of msgs){
    const esNuestro = (m.de||"").toLowerCase()===NOSOTROS || m.estado==="enviado";
    const texto = (m.cuerpo_texto && m.cuerpo_texto.trim())
      ? m.cuerpo_texto
      : (m.cuerpo_html ? "(contenido HTML — abre el mensaje individual para verlo)" : "(sin contenido)");
    arr.push({lado: esNuestro?"nos":"cli", texto, ts:m.recibido_en, adj:null});
    if(!esNuestro && m.respuesta_enviada && m.respuesta_enviada.trim()){
      arr.push({lado:"nos", texto:m.respuesta_enviada, ts:m.respondido_en||m.recibido_en, adj:m.adjunto_nombre});
    }
  }
  arr.sort((a,b)=> (new Date(a.ts||0)) - (new Date(b.ts||0)));
  return arr.map(it=>`
    <div class="burbuja ${it.lado==="nos"?"b-nos":"b-cli"}">
      <div class="b-meta">${it.lado==="nos"?"Nosotros":"Cliente"} · ${esc(fmtFecha(it.ts))}</div>
      <div>${esc(it.texto)}</div>
      ${it.adj?`<div class="b-adj">📎 ${esc(it.adj)}</div>`:""}
    </div>`).join("");
}

function adjuntoHtml(c){
  if(!c.adjunto_nombre) return "";
  return `<div style="margin-bottom:10px;font-size:13px">📎 <b>${esc(c.adjunto_nombre)}</b>
    <button class="btn btn-guardar" style="padding:4px 10px;font-size:12px" onclick="verAdjunto(${c.id})">Ver PDF</button></div>`;
}
async function verAdjunto(id){
  try{
    const r = await fetch("/api/adjunto?id="+id, { headers: { "x-panel-pass": pass } });
    if(!r.ok){ alert("No se pudo abrir el PDF"); return; }
    const blob = await r.blob();
    window.open(URL.createObjectURL(blob), "_blank");
  }catch(e){ alert("Error: "+e.message); }
}

function renderResp(c){
  const r = document.getElementById("mResp");
  if (c.estado === "enviado"){
    r.innerHTML = `<h3>✅ Cotización enviada</h3>${adjuntoHtml(c)}<div class="estado-msg">Enviada ${esc(fmtFecha(c.respondido_en||c.recibido_en))} · a ${esc(c.para)}</div>`;
    return;
  }
  if (c.estado === "respondido"){
    r.innerHTML = `<h3>✅ Respuesta enviada</h3>${adjuntoHtml(c)}<div class="enviada">${esc(c.respuesta_enviada)}</div>`;
    return;
  }
  const ajusteBlock = c.ajuste_pedido
    ? `<div class="ajuste-cola">⏳ <b>Ajuste en cola:</b> "${esc(c.ajuste_pedido)}"${c.ajuste_enviar?" · se <b>enviará</b> al terminar":""}
         <br><span style="color:var(--gray)">La IA lo aplicará y te avisará cuando esté listo.</span></div>`
    : `<div class="ajuste-box">
         <div class="ajuste-tit">💬 Ajuste IA</div>
         <textarea id="ajusteTxt" placeholder="Ej: 'cóbrale 180mil por baño, no 160mil'. Agrega 'envíalo' para que la IA lo mande sin tu validación."></textarea>
         <button class="btn btn-claude" onclick="pedirAjuste()">Pedir ajuste a la IA</button>
       </div>`;
  const revisarBlock = (c.confianza==="baja" && c.motivo_revision)
    ? `<div class="ajuste-cola" style="background:#fdecea;border-color:#f3b9b0;margin-bottom:10px">⚠️ <b>La IA sugiere que revises:</b> ${esc(c.motivo_revision)}</div>`
    : "";
  r.innerHTML = `
    <h3>✍️ Respuesta</h3>
    ${revisarBlock}
    ${adjuntoHtml(c)}
    <textarea id="respTxt" placeholder="Borrador del agente (revísalo y edítalo) o escribe tu respuesta…">${esc(c.respuesta_borrador||"")}</textarea>
    <div class="acciones">
      <button class="btn btn-guardar" onclick="guardar()">💾 Guardar borrador</button>
      <button class="btn btn-enviar" onclick="enviar()">📤 Aprobar y enviar</button>
      <button class="btn btn-spam" onclick="spamModal()">🚫 Marcar spam</button>
    </div>
    <div class="estado-msg" id="respMsg"></div>
    <hr style="border:0;border-top:1px solid var(--line);margin:14px 0" />
    ${ajusteBlock}`;
}

function msg(t){ const m=document.getElementById("respMsg"); if(m) m.textContent=t; }
function botones(dis){ document.querySelectorAll(".resp .btn").forEach(b=>b.disabled=dis); }

async function guardar(){
  botones(true); msg("Guardando…");
  try{
    const texto=document.getElementById("respTxt").value;
    const d = await api("/api/borrador",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:actual.id,texto})});
    msg(d.ok?"Borrador guardado.":"⚠️ "+(d.error||"error"));
  }catch(e){ msg("⚠️ error: "+e.message); }
  botones(false);
}

async function enviar(){
  const texto=document.getElementById("respTxt").value.trim();
  if(!texto){ msg("Escribe o redacta una respuesta primero."); return; }
  if(!confirm("¿Enviar esta respuesta como contacto@destaperapido.cl a "+actual.de+"?")) return;
  botones(true); msg("Enviando…");
  try{
    const d = await api("/api/enviar",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:actual.id,texto})});
    if(d.ok){ msg("✅ Enviado."); actual.estado="respondido"; actual.respuesta_enviada=texto; renderResp(actual); cargar(true); refrescarContadores(); }
    else msg("⚠️ "+(d.error||"no se pudo enviar"));
  }catch(e){ msg("⚠️ error: "+e.message); }
  botones(false);
}

async function spamModal(){
  if(!actual) return;
  if(!confirm("¿Marcar este correo como spam?")) return;
  await spam(actual.id);
  cerrar();
}

async function pedirAjuste(){
  const t=document.getElementById("ajusteTxt").value.trim();
  if(!t){ return; }
  botones(true); msg("Encolando ajuste…");
  try{
    const d=await api("/api/ajuste",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({id:actual.id,texto:t})});
    if(d.ok){ actual.estado="ajuste"; actual.ajuste_pedido=t; actual.ajuste_enviar=d.enviar?1:0; renderResp(actual); }
    else { msg("⚠️ "+(d.error||"error")); botones(false); }
  }catch(e){ msg("⚠️ error: "+e.message); botones(false); }
}

function cerrar(){ document.getElementById("overlay").style.display="none"; actual=null; }

// --- PWA / Notificaciones push ---
function urlB64ToUint8Array(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(s); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}
async function registrarSW(){
  if("serviceWorker" in navigator){ try{ await navigator.serviceWorker.register("/sw.js"); }catch(e){} }
}
async function activarNotis(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){
    alert("Para recibir notificaciones en iPhone: abre el panel en Safari, Compartir → Añadir a pantalla de inicio, ábrelo desde ese ícono y reintenta.");
    return;
  }
  if(!pass){ alert("Primero ingresa al panel."); return; }
  try{
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ alert("Permiso de notificaciones denegado."); return; }
    const reg=await navigator.serviceWorker.ready;
    const vapid=(await (await fetch("/vapid-public")).text()).trim();
    const vieja=await reg.pushManager.getSubscription();
    if(vieja){ try{ await vieja.unsubscribe(); }catch(e){} }
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8Array(vapid)});
    const d=await api("/api/push-subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(sub)});
    alert(d.ok? "🔔 Notificaciones activadas en este dispositivo." : "No se pudo activar: "+(d.error||""));
  }catch(e){
    alert("Error: "+e.message+"\n\nEn iPhone debe estar agregado a la pantalla de inicio y abierto desde ahí.");
  }
}
async function asegurarPush(){
  if(!pass) return;
  if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  if(Notification.permission!=="granted") return;
  try{
    const reg=await navigator.serviceWorker.ready;
    const vapid=(await (await fetch("/vapid-public")).text()).trim();
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8Array(vapid)}); }
    await api("/api/push-subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(sub)});
  }catch(e){}
}
registrarSW();
